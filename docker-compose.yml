services:
  postgres:
    image: postgres:16-alpine
    container_name: atiende_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atiende_dev
      POSTGRES_USER: atiende
      POSTGRES_PASSWORD: atiende_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atiende -d atiende_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atiende_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: atiende_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://atiende:atiende_secret@postgres:5432/atiende_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: atiende_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - server
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile.dev
    container_name: atiende_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://atiende:atiende_secret@postgres:5432/atiende_dev
    volumes:
      - ./ai:/app
      - ./ai/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
